spring.application.name=intern-management
server.port=8080

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/intern_management
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT configuration
jwt.secret=your_jwt_secret_key_please_change_this_to_a_more_secure_key_in_production_environment_with_at_least_256_bits
jwt.expiration=3600000

# Server configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

